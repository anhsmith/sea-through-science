<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>EM simulation explorer (embed)</title>
<style>
  /* Bare embed: the app only -- no heading, intro sentence or parameter tables.
     For iframing into slides (06-03), where that chrome is clutter. The full
     standalone pages (mfd-explorer.html / review-explorer.html) keep it. */
  html, body { background:#ffffff; color:#1f2937; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
         margin:0; padding:.7rem .9rem; }
</style>
</head>
<body>
<svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
<defs>
<symbol id="tuna" viewBox="0 0 1536 639" preserveAspectRatio="xMidYMid meet">
<g transform="translate(0,639) scale(0.1,-0.1)">
<path d="M10399 6356 c-562 -107 -1046 -252 -1539 -459 -176 -74 -550 -260 -720 -358 -472 -271 -965 -642 -1356 -1021 -72 -71 -134 -128 -137 -128 -4 0 -36 20 -73 45 -116 77 -288 138 -499 175 -60 11 -245 33 -410 50 -453 46 -617 80 -790 165 -166 82 -259 177 -346 355 -101 205 -191 322 -285 371 l-46 24 -40 -45 c-57 -62 -143 -196 -184 -284 -95 -206 -152 -431 -194 -760 -11 -88 -21 -161 -23 -162 -1 -1 -65 -14 -142 -28 -401 -77 -831 -209 -1210 -373 -527 -228 -1008 -510 -1755 -1029 -135 -94 -335 -233 -445 -309 -110 -76 -202 -140 -204 -142 -9 -6 33 -83 58 -106 14 -14 58 -45 96 -70 80 -51 129 -99 144 -140 21 -55 18 -57 -71 -57 -131 0 -195 -27 -220 -90 -13 -34 3 -59 76 -118 128 -103 235 -146 549 -217 331 -74 376 -93 702 -285 305 -179 390 -215 622 -264 169 -35 283 -45 678 -56 417 -12 782 -44 1078 -95 148 -25 318 -127 842 -506 289 -208 447 -311 595 -386 96 -48 111 -53 173 -53 l67 0 1 38 c6 197 -26 306 -156 527 -31 53 -71 127 -89 165 -32 67 -73 196 -65 204 2 2 110 11 239 20 439 32 1098 114 1526 192 300 54 272 55 394 -8 58 -29 240 -144 405 -254 472 -316 610 -394 826 -470 398 -139 773 -230 1139 -276 142 -18 728 -18 870 0 148 19 431 68 520 91 l75 19 -235 -5 c-386 -9 -843 18 -1149 68 -484 77 -861 236 -1113 469 -84 78 -174 191 -238 300 -42 71 -120 255 -120 282 0 12 11 13 67 6 86 -12 202 3 285 37 80 32 148 77 271 179 112 93 204 152 262 167 61 17 163 6 230 -25 31 -14 59 -26 61 -26 2 0 4 27 4 60 0 102 29 137 163 200 l88 41 47 -23 c37 -18 62 -23 117 -22 81 1 120 17 262 100 188 111 275 138 359 115 30 -8 40 -8 43 2 7 24 97 102 141 124 32 15 78 24 161 32 168 14 313 50 633 156 476 159 715 205 1055 205 l137 0 165 -168 c91 -92 323 -341 517 -554 405 -446 599 -648 785 -817 377 -342 697 -556 1034 -690 105 -41 242 -85 227 -72 -5 4 -37 29 -72 55 -125 95 -257 244 -375 426 -87 134 -197 342 -420 790 -219 441 -277 542 -448 777 -185 253 -221 350 -222 593 -1 167 15 271 68 436 140 443 455 918 1091 1649 258 297 335 387 330 392 -7 8 -235 -71 -352 -122 -159 -68 -271 -130 -424 -233 -308 -207 -568 -459 -1020 -987 - </g></symbol>
</defs>
</svg>
<!-- =====================================================================
     Shared-catch anatomy explorer  (audit track, per-set decomposition)
     ---------------------------------------------------------------------
     Companion to explorer/audit-app.html, NOT a replacement. The two answer
     different questions:
       audit-app   DISTRIBUTIONAL -- what does the model imply about the data?
                   (N = 300-5000 sets, histograms, joint scatter)
       stacks-app  ANATOMICAL     -- what is a single set made of?
                   (10 sets, silhouette stacks, the A + X decomposition)

     Model: the (M, f, delta) map of R/binegbin_mfd.R.
       A    ~ NB(mu_A   = M f,            kappa_A)   shared catch -- BOTH counts
       X_lb ~ NB(lam_lb = M (1 - f)(1-b), kappa_X)   logbook-only excess
       X_em ~ NB(lam_em = M (1 - f)(1+b), kappa_X)   EM-only excess
       y_lb = A + X_lb        y_em = A + X_em

     BIAS. b is the model's delta on a SCALED axis: b = tanh(delta), bounded on
     [-1, 1]. This is an EXACT reparameterisation, not a linearisation -- the
     identity sig(2d) = (1 + tanh d)/2 gives
         2 M (1-f) sig(2 delta)  ==  M (1-f) (1 + tanh delta)  ==  lam_em
     so it is the same sampler audit-app.html uses. b reads directly as the
     fractional imbalance of excess between the methods,
         b = (lam_em - lam_lb) / (lam_em + lam_lb),
     and b = +/-1 is delta -> +/-inf: the limit where one method never records
     an unshared fish. No degeneracy, so the slider can reach the ends.

     The average of the two excess rates is M(1-f) for ANY b, so M is pinned to
     the midpoint whatever the bias. That is the point of exposing b at all:
     at b = 0 the two bars are identical and M sits on both their tops, which
     quietly implies "M is what a method reports on average". It is not. Turn b
     on and the bars separate while M stays at their AVERAGE, touching neither
     -- M is a midpoint of REPORTS, not a property of the fish.

     Why kappa_A and kappa_X are BOTH exposed: they are near-orthogonal
     channels, and that IS the lesson.
       kappa_A moves the pair up and down TOGETHER  -> sd(midpoint) only;
               it cannot touch the difference, because A cancels from it.
       kappa_X pulls the pair APART                 -> the whole difference.
     Checked at M=12: kappa_A 0->1 takes sd(midpoint) 3.16 -> 8.57 while
     sd(difference) goes 2.82 -> 2.83, i.e. unmoved.

     Visual grammar (carried over from R/schematic-shared-catch-v3.R):
       CONTINUOUS (bars, broken rules) = parameters, unobservable
       DISCRETE   (whole fish, ticks)  = realised counts
     mu_A = M f is 8.04 at the defaults -- you cannot draw 8.04 fish, and that
     impossibility is the point. Hence the expected panel is bars, not fish.

     kappa = 0 is the POISSON FLOOR, not determinism: at M=12 it still gives
     sd(count) = 3.5. There is no parameter setting that stills the stacks,
     which is why the expected panel is permanently parked on the left rather
     than hidden behind a toggle.

     Silhouette: Thunnus albacares by T. Michael Keesey, PhyloPic, public
     domain -- https://www.phylopic.org/images/f4503c9f-35df-4a0d-a6ca-c66c87d68274
     ===================================================================== -->
<style>
  #stk-app { font-size: 14px; max-width: 860px; }
  #stk-app .stk-row { display:flex; flex-wrap:wrap; gap:1.2rem; align-items:center; margin:.3rem 0 .6rem; }
  #stk-sliders { display:grid; grid-template-columns:1fr; gap:.4rem; margin:.3rem 0 .8rem; max-width:540px; }
  #stk-sliders label { display:flex; align-items:center; gap:.5rem; }
  #stk-sliders .lab { flex:0 0 14em; }
  /* line-height:0 stops <sub> inflating its row and breaking slider alignment */
  #stk-sliders .lab sub { line-height:0; font-size:.72em; }
  /* Chrome is DESATURATED on purpose. The browser default (#2563eb) sits at hue
     221 deg, only 26 deg from EM's Teal Reef (195 deg) -- inside the 30 deg
     minimum R/colours.R sets for colours sharing a figure. A saturated blue that
     close to the teal reads as a fourth data colour competing with the fish.
     A near-grey (saturation ~0.10) reads as UI, so hue separation stops
     mattering. Nothing here may borrow a palette hue: driftwood would collide
     with "shared", teal/sienna with the two methods. */
  #stk-sliders input[type=range] { flex:1; accent-color:#7A8288; }
  #stk-sliders .val { flex:0 0 5.4em; min-width:0; box-sizing:border-box;
    font:inherit; font-variant-numeric:tabular-nums; text-align:right;
    color:#3A3A3A; background:transparent; border:1px solid rgba(127,127,127,.45);
    border-radius:4px; padding:.05rem .2rem; }
  #stk-sliders .val:focus { outline:1px solid #7A8288; border-color:#7A8288; }
  #stk-readout { font-variant-numeric:tabular-nums; margin:.2rem 0 .7rem;
    padding:.45rem .6rem; border-radius:5px; background:rgba(127,127,127,.09);
    max-width:640px; line-height:1.55; }
  #stk-readout b { font-weight:600; }
  #stk-plot { overflow-x:auto; }
  #stk-app svg text { fill: currentColor; }
</style>

<div id="stk-app">
  <div class="stk-row">
    <button id="stk-resim" type="button">re-simulate</button>
    <span id="stk-seedinfo" style="color:#6b7280"></span>
  </div>
  <div id="stk-sliders"></div>
  <div id="stk-readout"></div>
  <div id="stk-plot"></div>
</div>

<script>
(function () {
  // ---- NB2 samplers (SD-scale kappa: size = 1/kappa^2) --------------------
  // Lifted verbatim from explorer/audit-app.html so the two explorers cannot
  // disagree about what the model is.
  function randn(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  function rgamma(shape){
    if (shape < 1) return rgamma(shape+1)*Math.pow(Math.random(),1/shape);
    const d=shape-1/3, c=1/Math.sqrt(9*d);
    while(true){ let x=randn(), v=Math.pow(1+c*x,3); if(v<=0) continue;
      const u=Math.random();
      if (u < 1-0.0331*x*x*x*x) return d*v;
      if (Math.log(u) < 0.5*x*x + d*(1-v+Math.log(v))) return d*v; } }
  function rpois(l){ if(l<=0) return 0;
    if (l<30){ const L=Math.exp(-l); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }
    return Math.max(0, Math.round(l+Math.sqrt(l)*randn())); }
  function rnbinom(mu,k){ if(k<=0) return rpois(mu); const s=1/(k*k); return rpois(rgamma(s)*(mu/s)); }

  // ---- palette (mirrors R/colours.R) --------------------------------------
  const C_LB="#C4622D", C_EM="#2D6A7F", C_SH="#9C8B78";      // Sienna / Teal / Driftwood
  const C_INK="#3A3A3A", C_SH_D="#6B5D4F";                    // rules and A ticks
  // The expected panel is muted by OPACITY, not by swapping in the *_light
  // palette: col_source_light's sienna (#EAC4A8) and col_na (#C8BDB0) are both
  // pale warm tones and the mu_A boundary vanished between them on the LB bar.
  // Same hues at low alpha also make the box read as the stacks' own colours.
  const MUTE = 0.45;

  const NSETS = 10;
  const DIALS = [
    // labels go in via innerHTML, so the symbols carry real markup: bold, with
    // true subscripts rather than a LaTeX-style "_A"
    {key:"M",  label:"Mean catch <b>M</b>",          min:1, max:25, step:0.5,  dp:1},
    {key:"f",  label:"Congruence <b>f</b>",          min:0, max:1,  step:0.01, dp:2},
    {key:"b",  label:"Method bias <b>β</b>",         min:-1, max:1, step:0.02, dp:2},
    {key:"kA", label:"Agree excess dispersion <b>κ<sub>A</sub></b>",   min:0, max:3, step:0.05, dp:2},
    {key:"kX", label:"Disagree excess dispersion <b>κ<sub>X</sub></b>",min:0, max:3, step:0.05, dp:2}
  ];
  const DEFAULTS = {M:12, f:0.67, b:0, kA:0, kX:0};

  // lam_lb, lam_em from (M, f, b). Their average is M(1-f) for any b, so M is
  // pinned to the midpoint of the two methods' expectations whatever the bias.
  const lams = p => { const l = p.M*(1-p.f); return [l*(1-p.b), l*(1+p.b)]; };

  const $ = id => document.getElementById(id);

  // ---- controls -----------------------------------------------------------
  const sliders = {};
  DIALS.forEach(d => {
    const wrap=document.createElement("label");
    wrap.innerHTML = `<span class="lab">${d.label}</span>`;
    const inp=document.createElement("input"); inp.type="range";
    inp.min=d.min; inp.max=d.max; inp.step=d.step;
    const num=document.createElement("input"); num.type="number"; num.className="val";
    num.min=d.min; num.max=d.max; num.step=d.step;
    wrap.appendChild(inp); wrap.appendChild(num);
    $("stk-sliders").appendChild(wrap);
    sliders[d.key]={inp,num,dp:d.dp};
    inp.addEventListener("input", ()=>{ num.value=(+inp.value).toFixed(d.dp); redraw(); });
    num.addEventListener("input", ()=>{
      if(num.value==="") return;
      const v=+num.value; if(!isFinite(v)) return;
      inp.value=v; redraw();
    });
    num.addEventListener("change", ()=>{
      let v=+num.value; if(!isFinite(v)) v=+inp.value;
      v=Math.min(d.max, Math.max(d.min, v));
      num.value=v.toFixed(d.dp); inp.value=v; redraw();
    });
  });
  function setVal(key,v){ const s=sliders[key]; s.inp.value=v; s.num.value=(+v).toFixed(s.dp); }
  Object.keys(DEFAULTS).forEach(k => setVal(k, DEFAULTS[k]));

  function readParams(){ const p={}; DIALS.forEach(d=>{
    const s=sliders[d.key]; let v=+s.num.value;
    if(!isFinite(v)) v=+s.inp.value;
    p[d.key]=Math.min(d.max, Math.max(d.min, v));
  }); return p; }

  // ---- simulate -----------------------------------------------------------
  // `sets` is regenerated ONLY on re-simulate / slider change, never on redraw
  // of the same state, so the picture is stable under a repaint.
  let sets = [];
  function simulate(p){
    const muA = p.M*p.f, [lamL, lamE] = lams(p);
    const out=[];
    for(let i=0;i<NSETS;i++){
      const A=rnbinom(muA,p.kA);
      out.push({A, y_lb:A+rnbinom(lamL,p.kX), y_em:A+rnbinom(lamE,p.kX)});
    }
    return out;
  }

  // ---- y axis: fixed from the PARAMETERS, never from the realised data -----
  // so that re-simulate churns the fish without the frame jumping. That is
  // what makes "parameters held, data moves" legible.
  function yMaxOf(p){
    const muA=p.M*p.f;
    const vA = muA + p.kA*p.kA*muA*muA;      // NB2 variance
    // 3 sd of headroom: enough that 20 draws overflow only rarely (and overflow
    // degrades to a "+n" marker, not a broken frame), without stranding the
    // stacks in the bottom half of the panel. Bias makes the two sides differ,
    // so frame whichever is taller.
    const need = Math.max(...lams(p).map(l => {
      const vX = l + p.kX*p.kX*l*l;
      return (muA + l) + 3*Math.sqrt(vA + vX);
    }));
    // Cap at 36: NB2 variance explodes with kappa (kappa_A = 1.5 wants ~50 rows),
    // which strands the stacks in the bottom third. Overflow degrades to a "+n".
    return Math.max(8, Math.min(36, Math.ceil(need)));
  }

  // ---- draw ---------------------------------------------------------------
  const SLOT=12, FH=10.4, FW=FH*2.404, COL=FW, PAIRW=2*COL, PITCH=PAIRW+16;
  const ML=42, MR=16, MT=16, MB=34, BARW=17, BARGAP=5, BOXPAD=9;
  const PANELW = 2*BARW + BARGAP + 2*BOXPAD;

  function fish(x, y, colour, flip){
    // <use> takes width/height; transform does the placing (and the mirror).
    const t = flip ? `translate(${(x+FW).toFixed(1)},${y.toFixed(1)}) scale(-1,1)`
                   : `translate(${x.toFixed(1)},${y.toFixed(1)})`;
    return `<use href="#tuna" width="${FW.toFixed(1)}" height="${FH.toFixed(1)}" transform="${t}" fill="${colour}"/>`;
  }

  function draw(p){
    const muA=p.M*p.f, ls=lams(p), yMax=yMaxOf(p);
    const panelX = ML;
    const setsX  = panelX + PANELW + 20;
    const W = setsX + NSETS*PITCH - (PITCH-PAIRW) + MR;
    const H = MT + yMax*SLOT + MB;
    const Y = v => MT + (yMax - v)*SLOT;

    // #tuna is defined once in a hidden <svg> near the top of <body>, so the
    // intro prose and this plot share one definition.
    let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" font-size="10">`;

    // --- expected panel: CONTINUOUS bars, because mu_A is not a count ------
    const boxY = Y(yMax) - 4, boxH = Y(0) - boxY + 4;
    s += `<rect x="${panelX-2}" y="${boxY}" width="${PANELW+4}" height="${boxH}" `
       + `fill="rgba(127,127,127,.05)" stroke="#cfc7bc" stroke-width="1" rx="4"/>`;
    s += `<text x="${panelX+PANELW/2}" y="${boxY-4}" text-anchor="middle" fill-opacity=".75">expected</text>`;

    // Bias separates the two bars; M stays at their average, touching neither.
    [0,1].forEach(k => {
      const bx = panelX + BOXPAD + k*(BARW+BARGAP);
      const cCol = k===0 ? C_LB : C_EM;
      const top  = muA + ls[k];
      // shared core mu_A, then this method's own lam on top; both continuous
      s += `<rect x="${bx}" y="${Y(muA).toFixed(1)}" width="${BARW}" height="${(muA*SLOT).toFixed(1)}" fill="${C_SH}" fill-opacity="${MUTE}"/>`;
      s += `<rect x="${bx}" y="${Y(top).toFixed(1)}" width="${BARW}" height="${(ls[k]*SLOT).toFixed(1)}" fill="${cCol}" fill-opacity="${MUTE}"/>`;
      s += `<text x="${bx+BARW/2}" y="${Y(0)+12}" text-anchor="middle" font-weight="600" `
         + `fill="${cCol}">${k===0?"LB":"EM"}</text>`;
    });

    // --- the two parameter rules leave the panel and cross every set -------
    s += `<line x1="${panelX+BOXPAD}" y1="${Y(p.M).toFixed(1)}" x2="${W-MR+6}" y2="${Y(p.M).toFixed(1)}" `
       + `stroke="${C_INK}" stroke-width="1.2" stroke-dasharray="1.5,2.5"/>`;
    s += `<text x="${ML-6}" y="${(Y(p.M)+3.5).toFixed(1)}" text-anchor="end" font-style="italic" font-size="12">M</text>`;
    s += `<line x1="${panelX+BOXPAD}" y1="${Y(muA).toFixed(1)}" x2="${W-MR+6}" y2="${Y(muA).toFixed(1)}" `
       + `stroke="${C_SH_D}" stroke-width="1.2" stroke-dasharray="6,3"/>`;
    s += `<text x="${ML-6}" y="${(Y(muA)+3.5).toFixed(1)}" text-anchor="end" font-size="12">&#956;<tspan font-size="9" dy="2">A</tspan></text>`;

    // --- the ten simulated sets: DISCRETE fish ----------------------------
    sets.forEach((d,i) => {
      const pcx = setsX + i*PITCH + PAIRW/2;
      [["lb",d.y_lb,C_LB,false],["em",d.y_em,C_EM,true]].forEach(([side,n,base,flip]) => {
        const x = (side==="lb") ? pcx-COL : pcx;
        const shown = Math.min(n, yMax);
        for(let j=1;j<=shown;j++){
          const col = (j<=d.A) ? C_SH : base;
          s += fish(x, Y(j-0.5)-FH/2, col, flip);
        }
        if(n>yMax) s += `<text x="${(x+COL/2).toFixed(1)}" y="${(Y(yMax)-3).toFixed(1)}" `
                      + `text-anchor="middle" fill-opacity=".8">+${n-yMax}</text>`;
      });
      // A_i: latent and per-set, so a short SOLID tick spanning just this pair
      s += `<line x1="${(pcx-COL-2).toFixed(1)}" y1="${Y(d.A).toFixed(1)}" x2="${(pcx+COL+2).toFixed(1)}" y2="${Y(d.A).toFixed(1)}" `
         + `stroke="${C_SH_D}" stroke-width="1.6"/>`;
      s += `<text x="${pcx}" y="${Y(0)+12}" text-anchor="middle" fill-opacity=".6">${i+1}</text>`;
    });

    // --- baseline ---------------------------------------------------------
    s += `<line x1="${panelX-2}" y1="${Y(0).toFixed(1)}" x2="${W-MR+6}" y2="${Y(0).toFixed(1)}" stroke="#999"/>`;
    s += `<text x="${ML-6}" y="${(Y(0)+3.5).toFixed(1)}" text-anchor="end" fill-opacity=".6">0</text>`;
    s += `<text x="${setsX + (NSETS*PITCH-(PITCH-PAIRW))/2}" y="${H-4}" text-anchor="middle" fill-opacity=".6">ten simulated sets</text>`;
    return s+"</svg>";
  }

  function redraw(){
    const p = readParams();
    sets = simulate(p);
    render(p);
  }
  function render(p){
    const muA=p.M*p.f, [lamL, lamE] = lams(p);
    $("stk-readout").innerHTML =
      `<b>Parameters</b> (continuous — the box on the left)<br>`
      + `&#956;<sub>A</sub> = M&#183;f = <b>${muA.toFixed(2)}</b> shared &#183; `
      + `&#955;<sup>LB</sup> = <b>${lamL.toFixed(2)}</b> &#183; `
      + `&#955;<sup>EM</sup> = <b>${lamE.toFixed(2)}</b> excess &#183; `
      + `M = &#956;<sub>A</sub> + (&#955;<sup>LB</sup>+&#955;<sup>EM</sup>)/2 = <b>${p.M.toFixed(2)}</b> &#183; `
      + `f = <b>${p.f.toFixed(2)}</b>`;
    $("stk-plot").innerHTML = draw(p);
  }

  $("stk-resim").addEventListener("click", redraw);
  redraw();
})();
</script>
</body>
</html>
