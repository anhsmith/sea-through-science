<!doctype html>
<html><head><meta charset="utf-8"><title>STS business card — Option 4 print</title>
<style>
  @page{size:96mm 61mm;margin:0;}
  :root{--navy:#071739;--ink:#0d1b2a;--wl:#54B5CB;--wd:#027DBF;--muted:#5b6b7c;--hair:#d7dee6;
    --font:"IBM Plex Sans","Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{margin:0;padding:0;font-family:var(--font);color:var(--ink);}
  .page{position:relative;width:96mm;height:61mm;overflow:hidden;}
  .page.front{page-break-after:always;}

  /* FRONT */
  .front{background:radial-gradient(120% 140% at 82% -25%,#103a6b 0%,var(--navy) 55%);}
  .front .safe{position:absolute;left:6mm;top:6mm;right:6mm;bottom:6mm;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .front .lock{width:62mm;height:13.3mm;}
  .front .tagline{margin-top:4.2mm;color:#b3c9df;font-size:7.4pt;line-height:1.5;letter-spacing:.02em;}
  .front .tagline b{color:#e7f1fb;font-weight:600;}

  /* BACK — navy panel */
  .back{background:#ffffff;}
  .back .panel{position:absolute;left:0;top:0;width:28mm;height:61mm;padding:3mm 0 3mm 3mm;
    background:radial-gradient(130% 120% at 35% 5%,#103a6b,var(--navy) 62%);
    display:flex;align-items:center;justify-content:center;}
  .back .panel .pmark{width:19mm;height:13.6mm;}
  .back .content{position:absolute;left:28mm;top:0;right:0;bottom:0;padding:6mm 6mm 6mm 4mm;
    display:flex;flex-direction:column;justify-content:center;}
  .name{font-size:12.5pt;font-weight:600;letter-spacing:-.01em;margin:0;line-height:1.05;}
  .name .cred{color:var(--muted);font-weight:500;}
  .role{margin:1mm 0 0;font-size:7.2pt;font-weight:600;letter-spacing:.02em;color:var(--wd);}
  .rule{height:.7mm;width:100%;border-radius:1mm;margin:2.4mm 0;background:linear-gradient(90deg,var(--wl),var(--wd));}
  .mid{display:flex;justify-content:space-between;align-items:center;gap:3mm;}
  .rows{display:flex;flex-direction:column;gap:1.6mm;font-size:7.2pt;}
  .row{display:flex;align-items:center;gap:1.8mm;color:#2c3a49;}
  .row svg{flex:none;width:3mm;height:3mm;color:var(--wd);}
  .row a{color:inherit;text-decoration:none;}
  .qr{width:20mm;height:20mm;flex:none;}
  .qr svg{width:100%;height:100%;display:block;shape-rendering:crispEdges;}
  .foot{margin-top:3mm;padding-top:1.8mm;border-top:.3mm solid var(--hair);display:flex;justify-content:center;gap:3.2mm;font-size:6.4pt;color:var(--muted);}
  .foot a{display:flex;align-items:center;gap:1.1mm;color:inherit;text-decoration:none;white-space:nowrap;}
  .foot svg{width:2.7mm;height:2.7mm;color:#8a97a5;}

  /* SCREEN-ONLY proof guides (ignored by print/PDF) */
  @media screen{
    html,body{background:#4a5763;}
    body{margin:0;padding:11mm 8mm;display:flex;flex-wrap:wrap;gap:13mm 10mm;justify-content:center;zoom:4.4;}
    .page{box-shadow:0 2mm 7mm rgba(0,0,0,.45);outline:.3mm solid #ff3dc7;}
    .page::before{content:"";position:absolute;left:3mm;top:3mm;right:3mm;bottom:3mm;border:.28mm dashed #22e0ff;pointer-events:none;z-index:60;}
    .front .safe,.back .content{outline:.24mm dashed #74ff5e;}
    .page::after{position:absolute;left:.2mm;top:-4.4mm;font:600 2.2mm/1 var(--font);color:#eaf1f8;white-space:nowrap;}
    .page.front::after{content:"FRONT (page 1)";}
    .page.back::after{content:"BACK (page 2)";}
  }
</style></head><body>
