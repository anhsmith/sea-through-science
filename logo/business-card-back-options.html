<title>STS business card — back layout options</title>
<style>
  :root{
    --navy:#071739;--ink:#0d1b2a;--wave-light:#54B5CB;--wave-dark:#027DBF;
    --muted:#5b6b7c;--hair:#dce3ea;
    --font:"IBM Plex Sans","Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%,#eef3f8,transparent),#e7edf3;
    -webkit-font-smoothing:antialiased;}
  .page{max-width:1240px;margin:0 auto;padding:44px 28px 80px;}
  h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 4px;}
  .sub{margin:0 0 34px;color:#8894a2;font-size:13px;}
  .grid{display:grid;grid-template-columns:repeat(2,max-content);gap:46px 46px;justify-content:center;}
  figure{margin:0;display:flex;flex-direction:column;align-items:center;gap:13px;}
  figcaption{font-size:12.5px;color:#6b7885;text-align:center;max-width:510px;line-height:1.5;}
  figcaption b{color:#243240;}
  .qrspec{display:inline-block;margin-top:4px;font-size:11px;color:#8a97a5;}

  .card{position:relative;width:510px;height:312px;border-radius:12px;overflow:hidden;background:#fff;
    box-shadow:0 1px 1px rgba(13,27,42,.05),0 16px 36px -12px rgba(13,27,42,.30);}
  .qr{shape-rendering:crispEdges;display:block;}
  .name{font-weight:600;letter-spacing:-.01em;margin:0;line-height:1.05;}
  .name .cred{color:var(--muted);font-weight:500;}
  .role{margin:4px 0 0;font-weight:600;letter-spacing:.02em;color:var(--wave-dark);}
  .row{display:flex;align-items:center;gap:8px;color:#2c3a49;}
  .row svg{flex:none;width:14px;height:14px;color:var(--wave-dark);}
  .row a{color:inherit;text-decoration:none;}
  .foot{display:flex;justify-content:center;gap:18px;color:var(--muted);}
  .foot a{display:flex;align-items:center;gap:6px;color:inherit;text-decoration:none;}
  .foot svg{width:12px;height:12px;color:#8a97a5;}
  .cap{color:var(--muted);font-size:9.5px;letter-spacing:.03em;text-align:center;line-height:1.3;}
  .rule{border-radius:2px;background:linear-gradient(90deg,var(--wave-light),var(--wave-dark));}

  /* ---------- O1 · right rail ---------- */
  .o1{padding:28px 30px;display:flex;flex-direction:column;justify-content:center;}
  .o1 .hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .o1 .name{font-size:24px;}
  .o1 .role{font-size:12.5px;}
  .o1 .mark{width:84px;height:60px;flex:none;}
  .o1 .rule{height:4px;width:100%;margin:15px 0;}
  .o1 .mid{display:flex;justify-content:space-between;align-items:center;gap:24px;}
  .o1 .rows{display:flex;flex-direction:column;gap:7px;font-size:12.5px;}
  .o1 .qr{width:102px;height:102px;flex:none;}
  .o1 .foot{margin-top:16px;padding-top:11px;border-top:1px solid var(--hair);font-size:11px;}

  /* ---------- O2 · QR feature (grid: mark↔name, QR↔details, caption↔socials) ---------- */
  .o2{padding:26px 30px;display:grid;grid-template-columns:112px 1fr;column-gap:28px;row-gap:13px;align-content:center;}
  .o2 .b-mark{grid-column:1;grid-row:1;justify-self:center;align-self:center;}
  .o2 .b-mark svg{width:84px;height:60px;display:block;}
  .o2 .i-name{grid-column:2;grid-row:1;align-self:center;}
  .o2 .name{font-size:22px;}
  .o2 .role{font-size:12.5px;}
  .o2 .rule{height:3px;width:56px;margin:11px 0 0;}
  .o2 .b-qr{grid-column:1;grid-row:2;justify-self:center;align-self:stretch;position:relative;aspect-ratio:1/1;min-height:0;}
  .o2 .b-qr .qr{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .o2 .rows{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:10px;font-size:12.5px;}
  .o2 .cap{grid-column:1;grid-row:3;justify-self:center;align-self:start;text-align:center;}
  .o2 .foot{grid-column:2;grid-row:3;align-self:start;justify-content:flex-start;font-size:11px;}

  /* ---------- O3 · centred / symmetric ---------- */
  .o3{padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .o3 .mark{width:66px;height:47px;}
  .o3 .name{font-size:22px;margin-top:9px;}
  .o3 .role{font-size:12px;}
  .o3 .rule{height:3px;width:56px;margin:11px 0 13px;}
  .o3 .rows{display:flex;flex-direction:column;gap:6px;font-size:12px;align-items:center;}
  .o3 .row{justify-content:center;}
  .o3 .qrwrap{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:12px;}
  .o3 .qr{width:96px;height:96px;}
  .o3 .foot{margin-top:12px;font-size:11px;}

  /* ---------- O4 · navy side panel (split) ---------- */
  .o4{display:flex;padding:0;}
  .o4 .panel{width:172px;flex:none;background:radial-gradient(120% 130% at 30% 0%,#103a6b,var(--navy) 60%);
    display:flex;align-items:center;justify-content:center;}
  .o4 .panel .mark{width:96px;height:69px;}
  .o4 .content{flex:1;padding:26px 26px;display:flex;flex-direction:column;justify-content:center;}
  .o4 .name{font-size:21px;}
  .o4 .role{font-size:11.5px;}
  .o4 .rule{height:3px;width:100%;margin:13px 0;}
  .o4 .mid{display:flex;justify-content:space-between;align-items:center;gap:18px;}
  .o4 .rows{display:flex;flex-direction:column;gap:6px;font-size:11.5px;}
  .o4 .qr{width:96px;height:96px;flex:none;}
  .o4 .foot{margin-top:14px;padding-top:10px;border-top:1px solid var(--hair);font-size:10.5px;gap:14px;}
</style>
