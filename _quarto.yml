project:
  type: website
  output-dir: docs
  # The slides/ reveal deck copies its .qmd into the output during render; left
  # there it breaks the next render (docs/docs/ nesting). This cleanup deletes
  # such strays after every render, automatically — see _clean-strays.R.
  post-render:
    - _clean-strays.R
  resources:
    - CNAME
    # Raw self-contained explorer apps. Quarto would probably discover these via
    # the iframe src, but relying on that is how you get a 404 in production.
    - interactive/apps/**
    # Whole favicon set. The manifest PNGs are referenced only inside
    # site.webmanifest (JSON), which Quarto's resource scan can't see, so copy
    # the folder wholesale.
    - favicon/**

website:
  title: "Sea Through Science"
  description: "Boutique consulting in statistical analysis, modelling, and marine research."
  # Absolute base URL so social-card image/url tags resolve for LinkedIn etc.
  site-url: https://www.seathrough.science
  # Default preview image for social shares (pages can override with their own image:)
  image: /img/plotnice3.png
  open-graph: true
  twitter-card:
    card-style: summary_large_image
  page-footer:
    left: "&copy; Copyright <script>document.write(new Date().getFullYear())</script>, Adam N. H. Smith<br>"
    right: "Built with ❤️ and [Quarto](https://quarto.org/)."
  navbar:
    pinned: true
    logo: /logo/svg/lockup-horiz-white.svg

    # your sub-pages
    left:
      - text: "About"
        href: index.qmd
      - text: "Services"
        href: services/index.qmd
      - text: "Who are we?"
        href: who/index.qmd
      - text: "Publications"
        href: publications/index.qmd
      - text: "BRUV"
        href: bruv/index.qmd
      # BRUVmaps was its own navbar item; the campaign maps now live in a
      # section on the BRUV page, where the prose already tells that story.
      # The map pages themselves are unmoved (bruvmaps/*.qmd).
      - text: "Interactive"
        menu:
          - text: "Shared-catch model"
            href: interactive/stacks.qmd
      - text: "Slides"
        href: slides/slides.qmd
      - text: "Contact"
        href: contact/index.qmd
    right:
      - icon: youtube
        href: https://www.youtube.com/@seathroughscience
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?hl=en&user=5OvrU9IAAAAJ
      - icon: github
        href: https://github.com/anhsmith
      - icon: linkedin
        href: https://www.linkedin.com/in/adam-smith-1a723532/
      - icon: envelope
        href: "mailto:adam@seathrough.science"

# Don't touch unless you know what you are doing :) ------------

format:
  html:
    fontsize: 1.1em
    # Full favicon set (svg tab icon + png/ico fallbacks + apple-touch + PWA
    # manifest), generated from the logo by logo/_generator/lockup.qmd.
    include-in-header:
      - _favicon-head.html
    theme:
      dark: [darkly, theme_darkly.scss, styles.scss]
      light: [flatly, theme_flatly.scss, styles.scss]
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    sidebar: true

execute:
  freeze: auto